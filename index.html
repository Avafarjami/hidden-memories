<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Ground Square</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: sans-serif; }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 40px; pointer-events: none; z-index: 10;
    }
    #start-btn {
      padding: 14px 32px; font-size: 16px; border-radius: 50px;
      background: rgba(255,255,255,0.9); border: none; cursor: pointer;
      pointer-events: all; font-weight: 600; color: #111;
    }
    #status {
      color: white; font-size: 14px; margin-bottom: 16px;
      background: rgba(0,0,0,0.5); padding: 8px 16px;
      border-radius: 20px; text-align: center; max-width: 280px;
    }

    /* ── input bar (hidden until square is placed) ── */
    #input-row {
      display: none;
      pointer-events: all;
      gap: 8px; align-items: center;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 8px 8px 8px 16px;
      width: 88%; max-width: 340px;
      margin-bottom: 12px;
    }
    #input-row.show { display: flex; }
    #msg-input {
      flex: 1; background: transparent;
      border: none; outline: none;
      color: #fff; font-size: 0.9rem;
    }
    #msg-input::placeholder { color: rgba(255,255,255,0.4); }
    #send-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: #00d4ff; border: none;
      font-size: 1rem; cursor: pointer; pointer-events: all;
    }
  </style>
</head>
<body>

<div id="overlay">
  <div id="status">Press the button to start</div>

  <!-- input bar -->
  <div id="input-row">
    <input id="msg-input" type="text" maxlength="30" placeholder="write something…">
    <button id="send-btn">↑</button>
  </div>

  <button id="start-btn">Start AR</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

let camera, scene, renderer;
let xrSession = null;
let hitTestSource = null;
let localSpace = null;
let anchor = null;
let squareMesh = null;
let reticleGroup = null;
let hitTestActive = false;
let textMeshes = [];

const statusEl  = document.getElementById('status');
const startBtn  = document.getElementById('start-btn');
const inputRow  = document.getElementById('input-row');
const msgInput  = document.getElementById('msg-input');
const sendBtn   = document.getElementById('send-btn');

/* ── Send text ── */
sendBtn.addEventListener('click', addText);
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') addText(); });

function addText() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = '';

  /* find a free slot in a 4x4 grid inside the 1x1 square */
  const cols = 4, rows = 4;
  const cw = 1 / cols, ch = 1 / rows;
  const slot = textMeshes.length;
  const col  = slot % cols;
  const row  = Math.floor(slot / cols);
  const x = -0.5 + cw * col + cw / 2;
  const z = -0.5 + ch * row + ch / 2;

  const mesh = makeTextMesh(text);
  mesh.position.set(x, 0.003, z);
  squareMesh.add(mesh);
  textMeshes.push(mesh);
}

/* ── Make flat text using canvas texture ── */
function makeTextMesh(text) {
  const canvas = document.createElement('canvas');
  canvas.width  = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 256, 64);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 24px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);

  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.22, 0.055),
    new THREE.MeshBasicMaterial({
      map: new THREE.CanvasTexture(canvas),
      transparent: true,
      side: THREE.DoubleSide,
      depthWrite: false
    })
  );
  mesh.rotation.x = -Math.PI / 2;
  return mesh;
}

/* ── Init Three.js ── */
function init() {
  scene  = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.setClearColor(0x000000, 0);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 1));
  const dir = new THREE.DirectionalLight(0xffffff, 1.5);
  dir.position.set(1, 2, 1);
  scene.add(dir);

  /* Reticle */
  reticleGroup = new THREE.Group();
  const reticleMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
  const outerRing = new THREE.Mesh(new THREE.RingGeometry(0.08, 0.10, 32), reticleMat);
  const innerDot  = new THREE.Mesh(new THREE.CircleGeometry(0.02, 16), new THREE.MeshBasicMaterial({ color: 0xffffff }));
  outerRing.rotation.x = -Math.PI / 2;
  innerDot.rotation.x  = -Math.PI / 2;
  reticleGroup.add(outerRing);
  reticleGroup.add(innerDot);
  reticleGroup.visible = false;
  scene.add(reticleGroup);

  /* Square */
  squareMesh = buildSquare();
  squareMesh.visible = false;
  scene.add(squareMesh);

  window.addEventListener('resize', onResize);
  startBtn.addEventListener('click', startAR);
}

function buildSquare() {
  const group = new THREE.Group();
  const fill = new THREE.Mesh(
    new THREE.PlaneGeometry(1, 1),
    new THREE.MeshStandardMaterial({ color: 0x00aaff, transparent: true, opacity: 0.25, side: THREE.DoubleSide, depthWrite: false })
  );
  fill.rotation.x = -Math.PI / 2;
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.PlaneGeometry(1, 1)),
    new THREE.LineBasicMaterial({ color: 0x00ccff, linewidth: 2 })
  );
  edges.rotation.x = -Math.PI / 2;
  group.add(fill);
  group.add(edges);
  group.add(makeCorners());
  group.position.y = 0.001;
  return group;
}

function makeCorners() {
  const group = new THREE.Group();
  const mat   = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 3 });
  const size  = 0.12, half = 0.5;
  [[-half,-half,1,0],[-half,half,1,0],[half,-half,-1,0],[half,half,-1,0],
   [-half,-half,0,1],[-half,half,0,1],[half,-half,0,-1],[half,half,0,-1]
  ].forEach(([x,z,dx,dz]) => {
    const pts = [new THREE.Vector3(x,0,z), new THREE.Vector3(x+dx*size,0,z+dz*size)];
    const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat);
    line.rotation.x = -Math.PI / 2;
    group.add(line);
  });
  return group;
}

/* ── Start AR ── */
async function startAR() {
  if (!navigator.xr) { statusEl.textContent = 'WebXR not supported.'; return; }
  const supported = await navigator.xr.isSessionSupported('immersive-ar');
  if (!supported) { statusEl.textContent = 'AR not supported on this device.'; return; }

  statusEl.textContent = 'Loading AR…';
  startBtn.style.display = 'none';

  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test', 'local-floor'],
      optionalFeatures: ['anchors', 'dom-overlay'],
      domOverlay: { root: document.getElementById('overlay') }
    });

    renderer.xr.setReferenceSpaceType('local-floor');
    await renderer.xr.setSession(xrSession);
    xrSession.addEventListener('end', onSessionEnd);
    localSpace = await xrSession.requestReferenceSpace('local-floor');
    hitTestSource = await xrSession.requestHitTestSource({ space: await xrSession.requestReferenceSpace('viewer') });
    hitTestActive = true;
    statusEl.textContent = 'Point at the floor, then tap';
    document.addEventListener('click', placeSquare);
    renderer.setAnimationLoop(onFrame);
  } catch(err) {
    statusEl.textContent = 'Error: ' + err.message;
    startBtn.style.display = '';
  }
}

/* ── Place square on tap ── */
async function placeSquare() {
  if (!reticleGroup.visible) return;

  const pos = new THREE.Vector3();
  reticleGroup.getWorldPosition(pos);
  squareMesh.position.copy(pos);
  squareMesh.position.y = 0;
  squareMesh.visible = true;

  /* show input bar */
  inputRow.classList.add('show');
  statusEl.textContent = 'Type a message ↑';

  if (xrSession.createAnchor) {
    try {
      const frame = renderer.xr.getFrame();
      anchor = await frame.createAnchor(
        new XRRigidTransform({ x: pos.x, y: 0, z: pos.z, w: 1 }, { x:0,y:0,z:0,w:1 }),
        localSpace
      );
      hitTestActive = false;
      reticleGroup.visible = false;
      document.removeEventListener('click', placeSquare);
    } catch(e) {}
  }
}

/* ── Render loop ── */
function onFrame(timestamp, frame) {
  if (!frame) return;

  if (hitTestActive && hitTestSource) {
    const hits = frame.getHitTestResults(hitTestSource);
    if (hits.length > 0) {
      const pose = hits[0].getPose(localSpace);
      if (pose) {
        reticleGroup.visible = true;
        reticleGroup.position.setFromMatrixPosition(new THREE.Matrix4().fromArray(pose.transform.matrix));
        reticleGroup.quaternion.setFromRotationMatrix(new THREE.Matrix4().fromArray(pose.transform.matrix));
      }
    } else {
      reticleGroup.visible = false;
    }
  }

  if (anchor && frame.trackedAnchors?.has(anchor)) {
    const ap = frame.getPose(anchor.anchorSpace, localSpace);
    if (ap) {
      squareMesh.position.setFromMatrixPosition(new THREE.Matrix4().fromArray(ap.transform.matrix));
      squareMesh.position.y = 0;
    }
  }

  renderer.render(scene, camera);
}

function onSessionEnd() {
  xrSession = null; anchor = null; hitTestSource = null; hitTestActive = false;
  squareMesh.visible = false; reticleGroup.visible = false;
  textMeshes = [];
  renderer.setAnimationLoop(null);
  inputRow.classList.remove('show');
  startBtn.style.display = '';
  statusEl.textContent = 'Press the button to start';
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

init();
</script>
</body>
</html>
